<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>LumosCore — Preview</title>
  <script>
    (function () {
      // Optional override: add ?desktop or ?mobile to the URL to force a version.
      var force = location.search.replace('?', '').toLowerCase();
      var ua = navigator.userAgent || '';
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobi/i.test(ua)
                     || window.matchMedia('(max-width: 820px)').matches;
      if (force === 'desktop') isMobile = false;
      if (force === 'mobile')  isMobile = true;
      location.replace(isMobile ? '/mobile.html' : '/desktop.html');
    })();
  </script>
</head>
<body style="font-family:system-ui,-apple-system,sans-serif;padding:44px;color:#333;line-height:1.6">
  <p>Opening the LumosCore preview…</p>
  <p>If you aren't redirected automatically:
     <a href="/desktop.html">Desktop version</a> &nbsp;·&nbsp;
     <a href="/mobile.html">Mobile version</a></p>
</body>
</html>
